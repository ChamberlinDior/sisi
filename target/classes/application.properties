# ============================================================
# PNIS BACKEND – Configuration principale
# Version : 2.0.0 | Avril 2026
# ============================================================

spring.application.name=pnis-backend
server.port=8080
server.servlet.context-path=/api/v1
server.compression.enabled=true
server.http2.enabled=true
server.error.include-message=never
server.error.include-stacktrace=never

# ===== DATASOURCE =====
spring.datasource.url=jdbc:mysql://localhost:3306/pnis_backend?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true&rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=PNIS-HikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ===== JPA / HIBERNATE =====
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false

# ===== FLYWAY =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# ===== MULTIPART =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=1000MB
spring.servlet.multipart.file-size-threshold=2MB

# ===== MAIL =====
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=pnis@gov.ga
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.default-encoding=UTF-8

# ===== CACHE =====
spring.cache.type=simple

# ===== CORS =====
app.cors.allowed-origins=http://localhost:3000,http://localhost:8081,http://127.0.0.1:3000,http://127.0.0.1:8081

# ===== JWT =====
app.jwt.secret=PNIS_SUPER_SECRET_KEY_MUST_BE_CHANGED_IN_PRODUCTION_MIN_64_CHARS_2026_GABON_SECURE
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=604800000
app.jwt.mfa-token-expiration-ms=300000

# ===== STORAGE =====
app.storage.upload-dir=./uploads
app.storage.max-file-size-bytes=524288000
app.storage.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp,image/tiff,video/mp4,video/mpeg,audio/mpeg,audio/wav,audio/ogg,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/plain,text/csv,application/json,application/xml,application/zip,application/x-7z-compressed
app.storage.preview-inline-types=image/*,video/*,audio/*,application/pdf,text/plain,text/csv,application/json

# ===== SECURITY =====
app.security.max-login-attempts=5
app.security.lockout-duration-minutes=30
app.security.session-max-concurrent=3
app.security.password-min-length=12
app.security.mfa-required-roles=ADMIN,SUPER_ADMIN,ANALYST_SENIOR,CORRIDOR_USER

# ===== AUDIT =====
app.audit.retention-days=3650
app.audit.worm-enabled=true

# ===== NOTIFICATIONS =====
app.notification.email-enabled=true
app.notification.sms-enabled=false
app.notification.websocket-enabled=true

# ===== OFFLINE SYNC =====
app.sync.enabled=true
app.sync.conflict-resolution=SERVER_WINS
app.sync.max-payload-mb=50

# ===== REPORTING =====
app.reporting.temp-dir=./temp/reports
app.reporting.watermark-text=PNIS GABON – DOCUMENT CLASSIFIÉ
app.reporting.default-classification=RESTRICTED

# ===== ADMIN =====
app.admin.default-super-admin-email=admin@pnis.gov.ga
app.admin.default-super-admin-password=Admin@PNIS2026!

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info,metrics,env,loggers,prometheus,flyway
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ACTUATOR_ADMIN
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.info.env.enabled=true
info.app.name=PNIS Backend
info.app.version=2.0.0
info.app.description=Plateforme Nationale Mutualisée de Renseignement

# ===== OPENAPI =====
springdoc.api-docs.path=/docs/api
springdoc.swagger-ui.path=/docs/swagger
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.default-produces-media-type=application/json

# ===== LOGGING =====
logging.level.root=INFO
logging.level.com.pnis=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n
logging.file.name=./logs/pnis-backend.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=500MB
